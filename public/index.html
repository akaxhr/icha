<!DOCTYPE html>
<html>
<head>
  <title>Akash Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/admin.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">Akaxhr_bot</div>

      <div class="sidebar-tools">
        <input
          id="chatSearch"
          placeholder="Search chats/users..."
          oninput="loadChats()"
        />
      </div>

      <div id="chats"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <span id="chatTitle" class="chat-title-top">Select a chat</span>

        <div class="topbar-actions">
          <label class="switch-label">
            <span>Vault</span>
            <input
              type="checkbox"
              id="vaultToggle"
              onchange="saveGroupSettings()"
            />
            <span class="switch"></span>
          </label>

          <label class="switch-label">
            <span>AI</span>
            <input
              type="checkbox"
              id="aiToggle"
              onchange="saveGroupSettings()"
            />
            <span class="switch"></span>
          </label>

          <button class="danger" onclick="deleteChat()">Delete</button>
        </div>
      </div>

      <div class="message-search">
        <input
          id="messageSearch"
          placeholder="Search messages/users..."
          oninput="loadMessages()"
        />
      </div>

      <div class="messages" id="messages">
        <div class="empty">No chat selected</div>
      </div>

      <div id="replyBox" class="reply-box hidden">
        <span id="replyText"></span>
        <button onclick="clearReply()">×</button>
      </div>

      <div class="input-bar">
        <input
          id="text"
          placeholder="Type as Akash bot..."
          onkeydown="handleEnter(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </main>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
