<!DOCTYPE html>
<html>
<head>
  <title>Ichas Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/admin.css" />
</head>

<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">Im_icha_bot</div>

      <div class="sidebar-tools">
        <input id="chatSearch" placeholder="Search chats/users..." oninput="loadChats()" />
      </div>

      <div id="chats"></div>
    </div>

    <div class="main">
      <div class="topbar">
        <span id="chatTitle" class="chat-title-top">Select a chat</span>

        <div class="topbar-actions">
          <button onclick="toggleSettingsPanel()">Settings</button>
          <button class="danger" onclick="deleteChat()">Delete</button>
        </div>
      </div>

      <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-grid">
          <label><input type="checkbox" id="ai_enabled" onchange="saveGroupSettings()" /> Chat AI replies</label>
          <label><input type="checkbox" id="welcome_enabled" onchange="saveGroupSettings()" /> Welcome</label>
          <label><input type="checkbox" id="spam_enabled" onchange="saveGroupSettings()" /> Spam control</label>
          <label><input type="checkbox" id="captcha_enabled" onchange="saveGroupSettings()" /> Captcha</label>
          <label><input type="checkbox" id="ai_master" onchange="saveGroupSettings()" /> AI moderation master</label>
          <label><input type="checkbox" id="ai_phishing" onchange="saveGroupSettings()" /> AI phishing</label>
          <label><input type="checkbox" id="ai_scam" onchange="saveGroupSettings()" /> AI scam</label>
          <label><input type="checkbox" id="ai_toxicity" onchange="saveGroupSettings()" /> AI toxicity</label>
          <label><input type="checkbox" id="ai_impersonation" onchange="saveGroupSettings()" /> AI impersonation</label>
          <label><input type="checkbox" id="ai_nsfw" onchange="saveGroupSettings()" /> AI NSFW</label>
          <label><input type="checkbox" id="ai_summary" onchange="saveGroupSettings()" /> AI summary</label>
        </div>
        <textarea id="rulesText" placeholder="Group rules"></textarea>
        <textarea id="welcomeText" placeholder="Welcome message. Use {first_name} and {chat_title}"></textarea>
        <button onclick="saveGroupSettings()">Save settings</button>
      </div>

      <div class="message-search">
        <input id="messageSearch" placeholder="Search messages/users..." oninput="loadMessages()" />
      </div>

      <div class="messages" id="messages">
        <div class="empty">No chat selected</div>
      </div>

      <div id="replyBox" class="reply-box hidden">
        <span id="replyText"></span>
        <button onclick="clearReply()">×</button>
      </div>

      <div class="input-bar">
        <input id="text" placeholder="Type as bot..." onkeydown="handleEnter(event)" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
