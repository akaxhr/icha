<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icha Admin Panel</title>
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <div class="tg-app">
    <aside class="tg-list">
      <div class="tg-search-row">
        <button class="hamburger">☰</button>
        <div class="tg-search">
          <span>🔍</span>
          <input id="searchInput" placeholder="Search" />
        </div>
      </div>

      <div id="chatList" class="tg-chats">
        <div class="loading">Loading chats...</div>
      </div>
    </aside>

    <main class="tg-chat">
      <header class="tg-chat-head">
        <div id="chatAvatar" class="small-avatar">🌹</div>
        <div class="head-info">
          <b id="groupTitle">Select chat</b>
          <span id="groupMeta">Messages will appear here</span>
        </div>
        <button id="searchBtn">🔍</button>
        <button id="moreBtn">⋮</button>
      </header>

      <div class="tg-pinned">
        <span>Pinned message</span>
        <b id="pinnedText">Beat me in Sudoku 🏆</b>
      </div>

      <section id="messages" class="tg-messages">
        <div class="empty">Select a chat</div>
      </section>

      <footer class="tg-input">
        <button>😊</button>
        <input id="replyInput" placeholder="Message" />
        <button>📎</button>
        <button id="sendBtn">🎙</button>
      </footer>
    </main>

    <aside class="tg-info">
      <div class="info-top">
        <button>×</button>
        <h3>Group Info</h3>
        <button>✎</button>
      </div>

      <div class="info-profile">
        <div id="infoAvatar" class="info-avatar">🌹</div>
        <h2 id="infoTitle">Group</h2>
        <p id="infoMeta">0 members</p>
      </div>

      <div class="info-card">
        <div class="info-row">
          <span>ⓘ</span>
          <div>
            <b>“Give respect, get respect” 🤝</b>
            <p id="groupDesc">No group description.</p>
            <small>Info</small>
          </div>
        </div>

        <div class="info-row">
          <span>🔗</span>
          <div>
            <b id="groupLink">No link</b>
            <small>Link</small>
          </div>
        </div>

        <div class="info-row">
          <span>🔔</span>
          <div>
            <b>Notifications</b>
          </div>
          <label class="switch">
            <input type="checkbox" checked />
            <i></i>
          </label>
        </div>
      </div>

      <div class="info-tabs">
        <button class="active">Members</button>
        <button>Media</button>
        <button>Files</button>
        <button>Links</button>
        <button>Music</button>
      </div>
    </aside>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
